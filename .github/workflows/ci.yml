name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: true

jobs:
  quality-checks:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install wasm32-unknown-unknown
        run: rustup target add wasm32-unknown-unknown
      - name: Check formatting (test-contracts)
        run: cargo fmt --all -- --check
        working-directory: ./test-contracts
      - name: Check formatting (native-contracts)
        run: cargo fmt --all -- --check
        working-directory: ./native-contracts
      - name: Check formatting (core)
        run: cargo fmt --all -- --check
        working-directory: ./core
      - name: Run clippy (test-contracts)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./test-contracts
      - name: Run clippy (native-contracts)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./native-contracts
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.8
      - name: Install wasm-opt
        run: cargo binstall wasm-opt --no-confirm
      - name: Run clippy (core)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./core
      - name: Check wit-validator compiles to wasm32-unknown-unknown
        run: cargo check -p wit-validator --target wasm32-unknown-unknown
        working-directory: ./core
      - name: Install wasm-tools
        run: cargo binstall wasm-tools --no-confirm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install kontor-ts dependencies
        run: npm ci
        working-directory: ./kontor-ts
      - name: Build kontor-ts (Rust + TS)
        run: npm run build:rs && npm run build
        working-directory: ./kontor-ts
      - name: Test kontor-ts
        run: npm test
        working-directory: ./kontor-ts
      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm
      - name: Audit (test-contracts)
        run: cargo audit
        working-directory: ./test-contracts
      - name: Audit (native-contracts)
        run: cargo audit
        working-directory: ./native-contracts
      - name: Audit core
        run: cargo audit --ignore RUSTSEC-2026-0049  # rustls-webpki 0.102.8 pinned by libsql
        working-directory: ./core

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Initial disk usage
        run: df -h
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev libboost-all-dev
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install zmq boost
      - name: Download Bitcoin Core v30.2
        run: |
          curl -L -o bitcoin.zip "https://github.com/KontorProtocol/Kontor/releases/download/bitcoin-v30.2/bitcoin-${{ runner.os }}-${{ runner.arch }}.zip"
          unzip bitcoin.zip -d bitcoin-bin
          chmod +x bitcoin-bin/*
          echo "${{ github.workspace }}/bitcoin-bin" >> $GITHUB_PATH
      - name: Test bitcoind
        run: bitcoind --version
      - name: Install wasm32-unknown-unknown
        run: rustup target add wasm32-unknown-unknown
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.8
      - name: Install cargo expand
        run: cargo binstall cargo-expand --no-confirm
      - name: Install wasm-opt
        run: cargo binstall wasm-opt --no-confirm
      - name: Run tests
        working-directory: ./core
        run: REGTEST=1 cargo test --release --workspace

  docker-cache-deps:
    name: Docker - Cache Dependencies (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and cache dependencies only
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          target: cacher
          tags: kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}-cacher
          cache-from: |
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}
          cache-to: |
            type=inline
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }},mode=max

  docker-build:
    name: Docker - Build Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: docker-cache-deps
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kontorprotocol/kontor
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=true

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}
          cache-to: |
            type=inline
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }},mode=max
          outputs: type=image,name=kontorprotocol/kontor,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker - Publish Multi-Arch Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kontorprotocol/kontor
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'kontorprotocol/kontor@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect kontorprotocol/kontor:${{ steps.meta.outputs.version }}
