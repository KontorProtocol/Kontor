name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: true

jobs:
  quality-checks:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install wasm32-unknown-unknown
        run: rustup target add wasm32-unknown-unknown
      - name: Check formatting (test-contracts)
        run: cargo fmt --all -- --check
        working-directory: ./test-contracts
      - name: Check formatting (native-contracts)
        run: cargo fmt --all -- --check
        working-directory: ./native-contracts
      - name: Check formatting (core)
        run: cargo fmt --all -- --check
        working-directory: ./core
      - name: Run clippy (test-contracts)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./test-contracts
      - name: Run clippy (native-contracts)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./native-contracts
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.8
      - name: Run clippy (core)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./core
      - name: Check wit-validator compiles to wasm32-unknown-unknown
        run: cargo check -p wit-validator --target wasm32-unknown-unknown
        working-directory: ./core
      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm
      - name: Audit (test-contracts)
        run: cargo audit
        working-directory: ./test-contracts
      - name: Audit (native-contracts)
        run: cargo audit
        working-directory: ./native-contracts
      - name: Audit core
        run: cargo audit  # ignored advisories are documented in core/.cargo/audit.toml
        working-directory: ./core

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # A flake on one OS shouldn't cancel the other's run — keep independent signal.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Initial disk usage
        run: df -h
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev libevent-dev
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        # `libevent` is mandatory at runtime — the bitcoind binary's dyld
        # path resolves directly to Homebrew's libevent_core dylib, and a
        # missing/ABI-skewed version aborts before `--version` can print.
        run: brew install boost libevent zeromq
      - name: Download Bitcoin Core v31.0
        run: |
          curl -L -o bitcoin.zip "https://github.com/KontorProtocol/Kontor/releases/download/bitcoin-v31.0/bitcoin-${{ runner.os }}-${{ runner.arch }}.zip"
          unzip bitcoin.zip -d bitcoin-bin
          chmod +x bitcoin-bin/*
          echo "${{ github.workspace }}/bitcoin-bin" >> $GITHUB_PATH
      - name: Test bitcoind
        run: bitcoind --version
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.8
      # Contracts are committed (test-contracts/binaries/), so the test build
      # compiles no wasm — no wasm32 target or wasm-opt needed here. cargo-expand
      # is still required by the stdlib macro-expansion tests.
      - name: Install cargo expand
        run: cargo binstall cargo-expand --no-confirm
      - name: Run tests
        working-directory: ./core
        run: REGTEST=1 cargo test --release --workspace

  # The committed genesis binaries are self-describing: binaries/build.json
  # records the platform that produced them. Resolve it to a matching runner so
  # the gate rebuilds NATIVELY on that arch (no emulation), wherever the binaries
  # were last built.
  reproducible-build-setup:
    name: Reproducible Build (resolve runner)
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.resolve.outputs.runner }}
      platform: ${{ steps.resolve.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        run: |
          platform=$(jq -r .platform native-contracts/binaries/build.json)
          case "$platform" in
            linux/amd64) runner=ubuntu-latest ;;
            linux/arm64) runner=ubuntu-24.04-arm ;;
            *) echo "unsupported build.json platform: $platform" >&2; exit 1 ;;
          esac
          echo "platform=$platform" >> "$GITHUB_OUTPUT"
          echo "runner=$runner" >> "$GITHUB_OUTPUT"

  reproducible-build:
    name: Reproducible Contract Build (${{ needs.reproducible-build-setup.outputs.platform }})
    needs: reproducible-build-setup
    runs-on: ${{ needs.reproducible-build-setup.outputs.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # The build image pins every input wasm bytes depend on (rustc by base tag,
      # wasm-opt by binaryen version+sha, brotli by exact apt version) and its
      # fixed /build WORKDIR pins the build path; on the resolved native runner the
      # arch matches too, so the output is a pure function of the source.
      - name: Build the pinned build image
        # No context (Dockerfile piped on stdin) — it has no COPY, needs no files.
        run: docker build -t kontor-build:ci - < tools/kontor-build.Dockerfile
      - name: Rebuild contracts in the image
        # Both committed sets (native genesis + test fixtures) are gated.
        run: |
          docker run --rm -v "$PWD:/build" -w /build \
            kontor-build:ci bash tools/build-in-image.sh native-contracts test-contracts
      # Surface the freshly-built artifacts regardless of outcome: on failure to
      # diff against, on success as the set to commit when regenerating.
      - name: Upload rebuilt binaries
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: contract-binaries
          path: |
            native-contracts/binaries/*.wasm.br
            test-contracts/binaries/*.wasm.br
          if-no-files-found: error
      - name: Assert binaries reproduce bit-for-bit
        # `git diff --exit-code` ignores untracked files, so a newly added
        # contract's uncommitted .wasm.br would slip through. git status --porcelain
        # catches additions, modifications, and deletions alike.
        run: |
          changed="$(git status --porcelain -- native-contracts/binaries/ test-contracts/binaries/)"
          if [ -n "$changed" ]; then
            echo "Committed binaries do not match a fresh build (incl. untracked):"
            echo "$changed"
            git diff -- native-contracts/binaries/ test-contracts/binaries/ || true
            exit 1
          fi

  publish-build-image:
    name: Publish Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: reproducible-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Built multi-arch so anyone can reproduce whichever platform a binaries/
      # build.json records (each arch yields different bytes — cargo bakes the
      # arch into crate metadata). The non-native leg builds under QEMU, but the
      # image only fetches a prebuilt wasm-opt + apt brotli, so emulation is cheap.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Derive the tag from the Dockerfile's rustc version (single source of
      # truth), matching the image ref recorded in each binaries/build.json — so
      # bumping the base image can't mislabel the published image.
      - name: Resolve image tag
        id: tag
        run: |
          v="$(grep -oP 'FROM rust:\K[0-9]+\.[0-9]+\.[0-9]+' tools/kontor-build.Dockerfile)"
          [ -n "$v" ] || { echo "could not parse rustc version from Dockerfile" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-arch build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/kontor-build.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: kontorprotocol/kontor-build:${{ steps.tag.outputs.version }}

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node + format check first, so a formatting violation fails in
      # seconds rather than after the release `cargo build`.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install SDK dependencies
        run: npm ci
        working-directory: ./sdk
      - name: Check formatting (sdk)
        run: npm run format:check
        working-directory: ./sdk
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev libevent-dev
      - name: Download Bitcoin Core v31.0
        run: |
          curl -L -o bitcoin.zip "https://github.com/KontorProtocol/Kontor/releases/download/bitcoin-v31.0/bitcoin-${{ runner.os }}-${{ runner.arch }}.zip"
          unzip bitcoin.zip -d bitcoin-bin
          chmod +x bitcoin-bin/*
          echo "${{ github.workspace }}/bitcoin-bin" >> $GITHUB_PATH
      - name: Test bitcoind
        run: bitcoind --version
      # `kontor regtest` (spawned by the SDK's `startRegtest`) is the
      # release binary; native contracts are committed `.wasm.br`, so this
      # needs no wasm toolchain.
      - name: Build kontor binary
        run: cargo build --release --bin kontor
        working-directory: ./core
      - name: Build SDK
        run: npm run build
        working-directory: ./sdk
      - name: Unit tests
        run: npm test
        working-directory: ./sdk
      - name: Live regtest test
        run: npm run test:regtest
        working-directory: ./sdk

  docker-cache-deps:
    name: Docker - Cache Dependencies (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and cache dependencies only
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          target: cacher
          tags: kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}-cacher
          cache-from: |
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}
          cache-to: |
            type=inline
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }},mode=max

  docker-build:
    name: Docker - Build Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: docker-cache-deps
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kontorprotocol/kontor
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=true

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}
          cache-to: |
            type=inline
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }},mode=max
          outputs: type=image,name=kontorprotocol/kontor,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker - Publish Multi-Arch Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kontorprotocol/kontor
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'kontorprotocol/kontor@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect kontorprotocol/kontor:${{ steps.meta.outputs.version }}
