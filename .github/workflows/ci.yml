name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: true

jobs:
  quality-checks:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install wasm32-unknown-unknown
        run: rustup target add wasm32-unknown-unknown
      - name: Check formatting (test-contracts)
        run: cargo fmt --all -- --check
        working-directory: ./test-contracts
      - name: Check formatting (native-contracts)
        run: cargo fmt --all -- --check
        working-directory: ./native-contracts
      - name: Check formatting (core)
        run: cargo fmt --all -- --check
        working-directory: ./core
      - name: Run clippy (test-contracts)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./test-contracts
      - name: Run clippy (native-contracts)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./native-contracts
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.8
      - name: Run clippy (core)
        run: cargo clippy --workspace --tests -- -D warnings
        working-directory: ./core
      - name: Check wit-validator compiles to wasm32-unknown-unknown
        run: cargo check -p wit-validator --target wasm32-unknown-unknown
        working-directory: ./core
      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm
      - name: Audit (test-contracts)
        run: cargo audit
        working-directory: ./test-contracts
      - name: Audit (native-contracts)
        run: cargo audit
        working-directory: ./native-contracts
      - name: Audit core
        run: cargo audit  # ignored advisories are documented in core/.cargo/audit.toml
        working-directory: ./core

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # A flake on one OS shouldn't cancel the other's run — keep independent signal.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Initial disk usage
        run: df -h
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev libevent-dev
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        # `libevent` is mandatory at runtime — the bitcoind binary's dyld
        # path resolves directly to Homebrew's libevent_core dylib, and a
        # missing/ABI-skewed version aborts before `--version` can print.
        run: brew install boost libevent zeromq
      - name: Download Bitcoin Core v31.0
        run: |
          curl -L -o bitcoin.zip "https://github.com/KontorProtocol/Kontor/releases/download/bitcoin-v31.0/bitcoin-${{ runner.os }}-${{ runner.arch }}.zip"
          unzip bitcoin.zip -d bitcoin-bin
          chmod +x bitcoin-bin/*
          echo "${{ github.workspace }}/bitcoin-bin" >> $GITHUB_PATH
      - name: Test bitcoind
        run: bitcoind --version
      - name: Install wasm32-unknown-unknown
        run: rustup target add wasm32-unknown-unknown
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.17.8
      - name: Install cargo expand
        run: cargo binstall cargo-expand --no-confirm
      - name: Install wasm-opt
        run: cargo binstall wasm-opt --no-confirm
      - name: Reproducible contract build (committed binaries must reproduce)
        # Reuses this job's kontor build; runs on both matrix legs (ubuntu=x86_64,
        # macos=arm64), so it covers the arch AND OS axes without dedicated jobs.
        # native-contracts/rust-toolchain.toml pins rustc for the contract build
        # (it overrides dtolnay's default), and brotli is pinned via Cargo.lock.
        run: |
          ( cd core && cargo build --release --bin kontor )
          core/target/release/kontor build native-contracts --out-dir native-contracts/binaries
          if ! git diff --quiet native-contracts/binaries/; then
            echo "::error::native-contracts/binaries/ did not reproduce on ${{ runner.os }} ${{ runner.arch }} — committed artifacts are stale or the build is non-deterministic"
            git status --short native-contracts/binaries/
            exit 1
          fi
          echo "native-contracts/binaries/ reproduced bit-for-bit on ${{ runner.os }} ${{ runner.arch }}"
      - name: Run tests
        working-directory: ./core
        run: REGTEST=1 cargo test --release --workspace

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Node + format check first, so a formatting violation fails in
      # seconds rather than after the release `cargo build`.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install SDK dependencies
        run: npm ci
        working-directory: ./sdk
      - name: Check formatting (sdk)
        run: npm run format:check
        working-directory: ./sdk
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ github.job }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ github.job }}-${{ runner.os }}-
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev libboost-all-dev libevent-dev
      - name: Download Bitcoin Core v31.0
        run: |
          curl -L -o bitcoin.zip "https://github.com/KontorProtocol/Kontor/releases/download/bitcoin-v31.0/bitcoin-${{ runner.os }}-${{ runner.arch }}.zip"
          unzip bitcoin.zip -d bitcoin-bin
          chmod +x bitcoin-bin/*
          echo "${{ github.workspace }}/bitcoin-bin" >> $GITHUB_PATH
      - name: Test bitcoind
        run: bitcoind --version
      # `kontor regtest` (spawned by the SDK's `startRegtest`) is the
      # release binary; native contracts are committed `.wasm.br`, so this
      # needs no wasm toolchain.
      - name: Build kontor binary
        run: cargo build --release --bin kontor
        working-directory: ./core
      - name: Build SDK
        run: npm run build
        working-directory: ./sdk
      - name: Unit tests
        run: npm test
        working-directory: ./sdk
      - name: Live regtest test
        run: npm run test:regtest
        working-directory: ./sdk

  docker-cache-deps:
    name: Docker - Cache Dependencies (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and cache dependencies only
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          target: cacher
          tags: kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}-cacher
          cache-from: |
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}
          cache-to: |
            type=inline
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }},mode=max

  docker-build:
    name: Docker - Build Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    needs: docker-cache-deps
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kontorprotocol/kontor
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
          flavor: |
            suffix=-${{ matrix.arch }},onlatest=true

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }}
          cache-to: |
            type=inline
            type=registry,ref=kontorprotocol/kontor:buildcache-main-${{ matrix.arch }},mode=max
          outputs: type=image,name=kontorprotocol/kontor,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker - Publish Multi-Arch Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v6
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kontorprotocol/kontor
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'kontorprotocol/kontor@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect kontorprotocol/kontor:${{ steps.meta.outputs.version }}
