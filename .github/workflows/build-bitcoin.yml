name: Build Bitcoin Binaries

on:
  workflow_dispatch:

env:
  BITCOIN_VERSION: v31.0

jobs:
  build:
    name: Build Bitcoin (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: macos-latest
          - runner: ubuntu-24.04-arm
    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential pkg-config \
            libevent-dev libboost-dev \
            libzmq3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        # Explicit `libevent` + `pkgconf` per the v31.0 macOS build doc.
        # When the runner image changes Homebrew's libevent ABI version
        # (e.g. 2.1.7 → 2.1.8), the resulting binary's dyld path bumps with
        # it; rerun this workflow on the new image to refresh the release.
        run: brew install boost pkgconf libevent zeromq

      - name: Build Bitcoin Core ${{ env.BITCOIN_VERSION }}
        run: |
          git clone https://github.com/bitcoin/bitcoin.git \
            --depth 1 --branch ${{ env.BITCOIN_VERSION }}
          cd bitcoin
          cmake -B build \
            -DENABLE_WALLET=OFF \
            -DENABLE_IPC=OFF \
            -DWITH_ZMQ=ON
          cmake --build build --parallel 4

      - name: Verify build
        run: |
          ls -la bitcoin/build/bin/
          bitcoin/build/bin/bitcoind --version

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: bitcoin-${{ runner.os }}-${{ runner.arch }}
          path: |
            bitcoin/build/bin/bitcoind
            bitcoin/build/bin/bitcoin-cli
