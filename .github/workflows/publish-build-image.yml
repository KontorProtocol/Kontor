name: Publish Build Image

# The pinned contract-build image (tools/kontor-build.Dockerfile). Runs manually
# (workflow_dispatch, any branch) so its registry digest can be captured + pinned
# into binaries/build.json, and automatically on main when the Dockerfile changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/kontor-build.Dockerfile

permissions:
  contents: read

jobs:
  publish:
    name: Publish Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Multi-arch so any platform a build.json records can be reproduced. The
      # non-native leg builds under QEMU, but the image only fetches a prebuilt
      # wasm-opt + apt brotli (no compile), so emulation is cheap.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Tag = the Dockerfile's rustc version (single source of truth).
      - name: Resolve image tag
        id: tag
        run: |
          v="$(grep -oP 'FROM rust:\K[0-9]+\.[0-9]+\.[0-9]+' tools/kontor-build.Dockerfile)"
          [ -n "$v" ] || { echo "could not parse rustc version from Dockerfile" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Build and push multi-arch build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/kontor-build.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: kontorprotocol/kontor-build:${{ steps.tag.outputs.version }}
      # Surface the digest to pin into build.json (manifest-list digest; the
      # platform field in provenance disambiguates the arch).
      - name: Show image digest
        run: |
          ref="kontorprotocol/kontor-build:${{ steps.tag.outputs.version }}"
          {
            echo "### Published \`$ref\`"
            echo ""
            echo "Pin this in binaries/build.json:"
            echo "\`\`\`"
            echo "kontorprotocol/kontor-build@${{ steps.build.outputs.digest }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "digest: kontorprotocol/kontor-build@${{ steps.build.outputs.digest }}"
          docker buildx imagetools inspect "$ref"
